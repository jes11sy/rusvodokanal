# =============================================================================
# russvodokanal.ru — статика + поддомены городов + /tg-notify → node tg-proxy.js
# =============================================================================
# 1) Выложить проект в /var/www/russvodokanal (или поменять $base в russvodokanal-server-core.conf)
# 2) cd /var/www/russvodokanal && npm install && sudo systemctl enable --now tg-proxy  (см. deploy/tg-proxy.service)
# 3) sudo cp nginx/russvodokanal-site.conf /etc/nginx/sites-available/russvodokanal
# 4) Если проект не в /var/www/russvodokanal — замените путь в двух include ниже
# 5) sudo ln -sf /etc/nginx/sites-available/russvodokanal /etc/nginx/sites-enabled/
# 6) sudo nginx -t && sudo systemctl reload nginx
#
# SSL: если блок :443 падает из‑за отсутствия сертификата — временно закомментируйте второй server { },
#      выдайте certbot, затем раскомментируйте.
# =============================================================================

map $host $city_suffix {
    default                    "";
    russvodokanal.ru           "";
    www.russvodokanal.ru       "";
    sar.russvodokanal.ru       "/cities/sar";
    eng.russvodokanal.ru       "/cities/eng";
    uly.russvodokanal.ru       "/cities/uly";
    tol.russvodokanal.ru       "/cities/tol";
    pnz.russvodokanal.ru       "/cities/pnz";
    yar.russvodokanal.ru       "/cities/yar";
    oms.russvodokanal.ru       "/cities/oms";
}

server {
    listen 80;
    listen [::]:80;
    server_name russvodokanal.ru www.russvodokanal.ru
                sar.russvodokanal.ru eng.russvodokanal.ru uly.russvodokanal.ru
                tol.russvodokanal.ru pnz.russvodokanal.ru yar.russvodokanal.ru
                oms.russvodokanal.ru;

    include /var/www/russvodokanal/nginx/russvodokanal-server-core.conf;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name russvodokanal.ru www.russvodokanal.ru
                sar.russvodokanal.ru eng.russvodokanal.ru uly.russvodokanal.ru
                tol.russvodokanal.ru pnz.russvodokanal.ru yar.russvodokanal.ru
                oms.russvodokanal.ru;

    ssl_certificate     /etc/letsencrypt/live/russvodokanal.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/russvodokanal.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # Раскомментируйте, если файл создан (certbot иногда добавляет сам):
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /var/www/russvodokanal/nginx/russvodokanal-server-core.conf;
}
