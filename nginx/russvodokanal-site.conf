# =============================================================================
# russvodokanal.ru — корень файлов на диске: /var/www/rusvodokanal (как у тебя на сервере)
#
# Установка конфига nginx (выполнять на сервере, полные пути):
#   sudo cp /var/www/rusvodokanal/nginx/russvodokanal-site.conf /etc/nginx/sites-available/russvodokanal
#   sudo ln -sf /etc/nginx/sites-available/russvodokanal /etc/nginx/sites-enabled/russvodokanal
#   sudo nginx -t && sudo systemctl reload nginx
#
# Если проект лежит в другом каталоге — замените ВЕЗДЕ ниже /var/www/rusvodokanal на свой путь
# (set $base, root в acme-challenge).
# =============================================================================

map $host $city_suffix {
    default                    "";
    russvodokanal.ru           "";
    www.russvodokanal.ru       "";
    sar.russvodokanal.ru       "/cities/sar";
    eng.russvodokanal.ru       "/cities/eng";
    uly.russvodokanal.ru       "/cities/uly";
    tol.russvodokanal.ru       "/cities/tol";
    pnz.russvodokanal.ru       "/cities/pnz";
    yar.russvodokanal.ru       "/cities/yar";
    oms.russvodokanal.ru       "/cities/oms";
}

server {
    listen 80;
    listen [::]:80;
    server_name russvodokanal.ru www.russvodokanal.ru
                sar.russvodokanal.ru eng.russvodokanal.ru uly.russvodokanal.ru
                tol.russvodokanal.ru pnz.russvodokanal.ru yar.russvodokanal.ru
                oms.russvodokanal.ru;

    set $base /var/www/rusvodokanal;
    root $base$city_suffix;

    index index.html;
    charset utf-8;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        root /var/www/rusvodokanal;
        allow all;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
        default_type text/plain;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        default_type application/xml;
    }

    location ~* \.(?:css|js|mjs|jpg|jpeg|png|gif|svg|webp|ico|woff2?|map)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /tg-notify {
        proxy_pass http://127.0.0.1:3377;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        client_max_body_size 256k;
    }

    error_page 404 /404.html;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name russvodokanal.ru www.russvodokanal.ru
                sar.russvodokanal.ru eng.russvodokanal.ru uly.russvodokanal.ru
                tol.russvodokanal.ru pnz.russvodokanal.ru yar.russvodokanal.ru
                oms.russvodokanal.ru;

    ssl_certificate     /etc/letsencrypt/live/russvodokanal.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/russvodokanal.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    set $base /var/www/rusvodokanal;
    root $base$city_suffix;

    index index.html;
    charset utf-8;

    location ^~ /.well-known/acme-challenge/ {
