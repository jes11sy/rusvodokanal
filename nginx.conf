# =============================================================================
# Полный минимальный nginx.conf для проверки на сервере или в контейнере.
# В продакшене чаще правят только sites-available; тогда используйте файл:
#   nginx/russvodokanal-site.conf
# и подключают его из /etc/nginx/nginx.conf так:
#   include /etc/nginx/sites-enabled/*;
# =============================================================================

worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Подключение сайта (путь относительно каталога, где лежит этот nginx.conf,
    # или замените на абсолютный: /etc/nginx/sites-available/russvodokanal)
    include nginx/russvodokanal-site.conf;
}
